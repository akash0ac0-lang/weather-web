<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Weather Pro | Next-Gen</title>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 0% 0%, #1e293b 0%, #020617 100%);
        }

        /* Dashboard Container */
        .dashboard {
            width: 95%;
            max-width: 1250px;
            height: 800px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(40px);
            border-radius: 40px;
            border: 1px solid var(--border);
            display: flex;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.7);
        }

        /* Sidebar: Main Info */
        .sidebar {
            width: 400px;
            background: rgba(255, 255, 255, 0.02);
            padding: 60px 45px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .search-container {
            position: relative;
            margin-bottom: 50px;
        }

        .search-container input {
            width: 80%;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 18px 25px;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-container input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .main-display {
            text-align: center;
            flex-grow: 1;
        }

        .main-display img {
            width: 180px;
            filter: drop-shadow(0 0 30px var(--accent));
        }

        .main-display h1 {
            font-size: 110px;
            margin: 10px 0;
            font-weight: 800;
            letter-spacing: -6px;
        }

        .main-display .city-name {
            font-size: 32px;
            font-weight: 600;
            color: var(--accent);
        }

        .main-display .date {
            color: #64748b;
            margin-top: 10px;
            font-size: 18px;
        }

        /* Content Area: Grid Stats */
        .main-content {
            flex-grow: 1;
            padding: 60px;
            overflow-y: auto;
        }

        .grid-header {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .card {
            background: var(--glass);
            padding: 35px;
            border-radius: 35px;
            border: 1px solid var(--border);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }

        .card i {
            color: var(--accent);
            margin-bottom: 25px;
            width: 32px;
            height: 32px;
        }

        .card .label {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .card .value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 12px;
        }

        /* Summary AI Section */
        .ai-summary {
            margin-top: 50px;
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), transparent);
            border-radius: 35px;
            padding: 40px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .ai-summary h3 {
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Animation for loading */
        .loading-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        @media (max-width: 1100px) {
            .dashboard {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Type city or state...">
                <button id="location-btn"
                    style="position: absolute; right: 20%; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--accent);">
                    <i data-feather="map-pin"></i>
                </button>
            </div>

            <div class="main-display">
                <img src="https://openweathermap.org/img/wn/02d@4x.png" id="weather-icon">
                <h1 id="temp-val">--°</h1>
                <div class="city-name" id="city-val">Ready?</div>
                <div class="date" id="date-val">--</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="grid-header">Live Atmospheric Metrics</div>

            <div class="stats-grid">
                <div class="card">
                    <i data-feather="droplet"></i>
                    <div class="label">HUMIDITY</div>
                    <div class="value" id="humidity-val">--%</div>
                </div>
                <div class="card">
                    <i data-feather="wind"></i>
                    <div class="label">WIND SPEED</div>
                    <div class="value" id="wind-val">-- <small>km/h</small></div>
                </div>
                <div class="card">
                    <i data-feather="thermometer"></i>
                    <div class="label">FEELS LIKE</div>
                    <div class="value" id="feels-val">--°</div>
                </div>
                <div class="card">
                    <i data-feather="sun"></i>
                    <div class="label">UV INDEX</div>
                    <div class="value">Moderate</div>
                </div>
                <div class="card">
                    <i data-feather="eye"></i>
                    <div class="label">VISIBILITY</div>
                    <div class="value" id="vis-val">-- <small>km</small></div>
                </div>
                <div class="card">
                    <i data-feather="arrow-down"></i>
                    <div class="label">PRESSURE</div>
                    <div class="value" id="press-val">--</div>
                </div>
            </div>

            <div class="ai-summary">
                <h3><i data-feather="cpu"></i> Smart Forecast Summary</h3>
                <p id="summary-val" style="color: #94a3b8; line-height: 1.8;">
                    Search for any location to get a real-time AI-powered weather breakdown.
                </p>
            </div>
        </main>
    </div>

    <script>
        // API KEY (Make sure it's active)
        const API_KEY = "ebf8bea7ceb69e320d025863819e477a";

        feather.replace();

        async function getWeatherData(location) {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${location}&units=metric&appid=${API_KEY}`);

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message);
                }

                const data = await response.json();
                renderUI(data);

            } catch (error) {
                alert("Error: " + error.message.toUpperCase());
                console.log("Key might be inactive. Wait 2-3 hours for new keys.");
            }
        }

        function renderUI(data) {
            // Updating Sidebar
            document.getElementById('temp-val').innerText = `${Math.round(data.main.temp)}°`;
            document.getElementById('city-val').innerText = `${data.name}, ${data.sys.country}`;
            document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;

            // Updating Stats
            document.getElementById('humidity-val').innerText = `${data.main.humidity}%`;
            document.getElementById('wind-val').innerHTML = `${data.wind.speed} <small>km/h</small>`;
            document.getElementById('feels-val').innerText = `${Math.round(data.main.feels_like)}°`;
            document.getElementById('vis-val').innerHTML = `${(data.visibility / 1000).toFixed(1)} <small>km</small>`;
            document.getElementById('press-val').innerText = `${data.main.pressure} hPa`;

            // Summary
            document.getElementById('summary-val').innerHTML = `In <b>${data.name}</b>, the current conditions are <b>${data.weather[0].description}</b>. With a humidity of <b>${data.main.humidity}%</b> and wind speed of <b>${data.wind.speed} km/h</b>, it feels like <b>${Math.round(data.main.feels_like)}°C</b>.`;
        }

        // Search Input
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== "") {
                getWeatherData(e.target.value);
            }
        });

        // Geolocation
        document.getElementById('location-btn').addEventListener('click', () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&units=metric&appid=${API_KEY}`);
                const data = await res.json();
                if (res.ok) renderUI(data);
            });
        });

        // Date init
        const dateOptions = { weekday: 'long', day: 'numeric', month: 'short' };
        document.getElementById('date-val').innerText = new Date().toLocaleDateString('en-US', dateOptions);

    </script>
</body>

</html>
